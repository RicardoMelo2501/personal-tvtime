<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TV Time Clone</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111113">

<link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
<link rel="icon" href="icons/favicon-16.png" sizes="16x16" type="image/png">

<!-- iOS "Add to Home Screen" ignores the manifest; it only reads these -->
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TV Time">

<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <div class="login-icon">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="18" x2="12" y2="21"></line></svg>
    </div>
    <h1>TV Time Clone</h1>
    <p class="login-sub">Entre para ver sua lista</p>
    <form id="login-form" autocomplete="on">
      <input id="login-email" type="email" placeholder="E-mail" autocomplete="username" required>
      <input id="login-password" type="password" placeholder="Senha" autocomplete="current-password" required>
      <button type="submit" class="login-submit">Entrar</button>
      <div id="login-error" class="login-error"></div>
    </form>
  </div>
</div>

<div class="phone" style="display:none;">

  <div id="screen-home" class="screen active">
    <header class="app-header">
      <div class="tabs">
        <button class="tab active" data-tab="minha-lista">MINHA LISTA</button>
        <button class="tab" data-tab="em-breve">EM BREVE</button>
        <button class="tab" data-tab="assistidos">ASSISTIDOS</button>
      </div>
      <button id="view-toggle" class="icon-btn" title="Alternar visualização">
        <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>
      </button>
    </header>

    <main id="list-container" class="list-container list-view"></main>
  </div>

  <div id="screen-lancamentos" class="screen">
    <header class="app-header simple-header">
      <h1>Minhas Listas</h1>
    </header>
    <main id="lists-container" class="list-container"></main>
  </div>

  <div id="screen-busca" class="screen">
    <header class="app-header simple-header">
      <h1>Buscar</h1>
    </header>
    <div class="search-bar">
      <input id="search-input" type="text" placeholder="Buscar filmes e séries...">
    </div>
    <main id="search-results" class="list-container"></main>
  </div>

  <div id="screen-perfil" class="screen">
    <header class="app-header simple-header">
      <h1>Perfil</h1>
    </header>
    <main id="profile-container" class="profile-container"></main>
  </div>

  <div id="screen-progresso" class="screen">
    <header class="app-header">
      <div class="tabs">
        <button class="progress-tab active" data-status="all">TODAS</button>
        <button class="progress-tab" data-status="continuing">ASSISTINDO</button>
        <button class="progress-tab" data-status="stopped">PARADAS</button>
        <button class="progress-tab" data-status="up_to_date">COMPLETAS</button>
      </div>
    </header>
    <main id="progress-container" class="list-container progress-container"></main>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="home" title="Minha lista">
      <svg viewBox="0 0 24 24" width="22" height="22"><rect x="2" y="4" width="20" height="14" rx="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="18" x2="12" y2="21"></line></svg>
    </button>
    <button class="nav-btn" data-screen="lancamentos" title="Minhas listas">
      <svg viewBox="0 0 24 24" width="22" height="22"><rect x="3" y="4" width="18" height="18" rx="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="16" y1="2" x2="16" y2="6"></line></svg>
    </button>
    <button class="nav-btn" data-screen="progresso" title="Progresso">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"></circle><path d="M12 3a9 9 0 0 1 9 9h-9z" fill="currentColor" stroke="none"></path></svg>
    </button>
    <button class="nav-btn" data-screen="busca" title="Buscar">
      <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    </button>
    <button class="nav-btn" data-screen="perfil" title="Perfil">
      <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="8" r="4"></circle><path d="M4 21c0-4 4-6 8-6s8 2 8 6"></path></svg>
    </button>
  </nav>
</div>

<div id="toast" class="toast"></div>

<div id="episode-modal" class="episode-modal">
  <div class="episode-modal-backdrop"></div>
  <div class="episode-modal-sheet">
    <button id="episode-modal-close" class="episode-modal-close" title="Fechar" aria-label="Fechar">&times;</button>
    <div id="episode-modal-body"></div>
  </div>
</div>

<div id="detail-screen" class="detail-screen">
  <header class="detail-header">
    <button id="detail-back" class="detail-back" title="Voltar" aria-label="Voltar">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"></path></svg>
    </button>
    <span class="detail-header-title">Detalhes</span>
  </header>
  <div id="detail-body" class="detail-body"></div>
</div>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
